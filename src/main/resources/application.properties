
server.servlet.context-path=/oc-sys
server.port=8081

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/intellisea
spring.datasource.username=midnightforever
spring.datasource.password=${DB_PASSWORD:midnightforever}

#mybatis
mybatis.configuration.map-underscore-to-camel-case=true

# JWT Configuration
# IMPORTANT: Change this secret key in production!
# Must be at least 256 bits (32 characters) for HS256
auth.jwt.secret=${JWT_SECRET:change-this-secret-key-in-production-environment}
auth.jwt.access-token-validity=900000
auth.jwt.refresh-token-validity=604800000

# Logging
logging.level.jp.co.intellisea.oc.web.auth=DEBUG
logging.level.org.springframework.security=DEBUG

